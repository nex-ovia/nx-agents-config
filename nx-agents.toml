[config]
name = "nx-agents-config"
repo = "~/.nx-agents-config"
home = "~/.nx-agents-config"
store = "store"
license = "MIT"
version = "1.0.0"

[shared.skills]
path = "shared/skills"
desc = "Agent skill definitions (<name>/SKILL.md)"

[shared.rules]
path = "shared/rules"
desc = "Reusable instruction/rule files (*.md)"

[shared.memory]
path = "shared/memory"
desc = "Cross-session persistent context store"

[shared.projects]
path = "shared/projects"
desc = "Cross-agent project context directories"

[[tool]]
name = "opencode"
desc = "OpenCode AI coding assistant"
external = "~/.config/opencode"
data = "~/.local/share/opencode"
dependencies = ["opencode", "bun"]

[[tool.external_dir]]
path = "~/.local/share/opencode"
store_path = "userdata"
desc = "OpenCode sessions database"
gitignore = ["*.db-shm", "*.db-wal", "log/", "repos/", "bin/", "storage/", "tool-output/"]

[[tool.internal]]
from = "skills"
to = "../shared/skills"
desc = "Shared skills"

[[tool.internal]]
from = "shared-projects"
to = "../shared/projects"
desc = "Shared project context"

[[tool.file]]
path = "opencode.json"
desc = "Global config with model routing"

[[tool]]
name = "claude"
desc = "Claude Code CLI by Anthropic"
external = "~/.claude"
data = "~/.claude"
dependencies = ["claude"]
gitignore = ["*.jsonl", "sessions/", "ide/", "session-env/", "shell-snapshots/", "file-history/", "backups/"]

[[tool.internal]]
from = "skills"
to = "../shared/skills"
desc = "Shared skills"

[[tool.internal]]
from = "shared-projects"
to = "../shared/projects"
desc = "Shared project context"

[[tool.file]]
path = "CLAUDE.md"
desc = "Instructions pointing to shared resources"

[[tool.external_file]]
path = "~/.claude.json"
desc = "Claude global config file"
